name: PRGuard Checks

on:
  pull_request:
    branches:
      - main

jobs:
  prguard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run Dummy Check
        run: |
          echo "PRGuard AI Running"
